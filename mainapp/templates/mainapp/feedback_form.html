{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обратная связь по мероприятию</title>
    <link rel="stylesheet" href="{% static 'mainapp/css/googleapis_css2.css' %}">
    <link rel="stylesheet" href="{% static 'mainapp/css/style.css' %}">
    <style>
        .feedback-form-container {
            max-width: 600px;
            margin: 2rem auto;
            background: white;
            border-radius: 28px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        
        .feedback-title {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .feedback-title h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        
        .feedback-title .application-name {
            background: linear-gradient(135deg, #0039a6, #da291c);
            color: white;
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.9rem;
        }
        
        .rating-stars {
            display: flex;
            gap: 0.5rem;
            margin: 0.5rem 0 1rem;
            justify-content: center;
        }
        
        .rating-star {
            font-size: 2.5rem;
            cursor: pointer;
            color: #cbd5e1;
            transition: all 0.2s ease;
        }
        
        .rating-star:hover,
        .rating-star.active {
            color: #ffc107;
            transform: scale(1.1);
        }
        
        .rating-hint {
            text-align: center;
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 1rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            font-weight: 700;
            color: #0039a6;
            margin-bottom: 0.5rem;
        }
        
        .form-group label .required {
            color: #da291c;
            margin-left: 0.25rem;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.85rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #0039a6;
            box-shadow: 0 0 0 3px rgba(0, 57, 166, 0.1);
        }
        
        .form-group input.error,
        .form-group textarea.error {
            border-color: #da291c;
            background: #fff5f5;
        }
        
        .error-message {
            color: #da291c;
            font-size: 0.75rem;
            margin-top: 0.25rem;
            display: none;
        }
        
        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }
        
        .btn-submit {
            flex: 2;
            background: linear-gradient(135deg, #28a745, #1e7e34);
            color: white;
            border: none;
            padding: 0.85rem;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(40, 167, 69, 0.3);
        }
        
        .btn-cancel {
            flex: 1;
            background: #6c757d;
            color: white;
            border: none;
            padding: 0.85rem;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
        }
        
        .btn-cancel:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .loading-spinner {
            background: white;
            padding: 1.5rem;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        
        .loading-spinner::before {
            content: '';
            width: 40px;
            height: 40px;
            border: 3px solid #e2e8f0;
            border-top-color: #0039a6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            z-index: 1100;
            animation: slideIn 0.3s ease;
        }
        
        .notification.success { background: linear-gradient(135deg, #28a745, #1e7e34); }
        .notification.error { background: linear-gradient(135deg, #da291c, #b52015); }
        
        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @media (max-width: 640px) {
            .feedback-form-container {
                margin: 1rem;
                padding: 1.5rem;
            }
            
            .form-actions {
                flex-direction: column;
            }
            
            .rating-star {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="feedback-form-container">
        <div class="feedback-title">
            <h1>📝 Обратная связь</h1>
            <div class="application-name" id="applicationName"></div>
        </div>
        
        <form id="feedbackForm">
            {% csrf_token %}
            <input type="hidden" id="applicationId" name="application_id">
            
            <div class="form-group">
                <label>⭐ Как прошло мероприятие? <span class="required">*</span></label>
                <div class="rating-stars" id="ratingStars">
                    <span class="rating-star" data-value="1">★</span>
                    <span class="rating-star" data-value="2">★</span>
                    <span class="rating-star" data-value="3">★</span>
                    <span class="rating-star" data-value="4">★</span>
                    <span class="rating-star" data-value="5">★</span>
                    <span class="rating-star" data-value="6">★</span>
                    <span class="rating-star" data-value="7">★</span>
                    <span class="rating-star" data-value="8">★</span>
                    <span class="rating-star" data-value="9">★</span>
                    <span class="rating-star" data-value="10">★</span>
                </div>
                <div class="rating-hint" id="ratingHint">Нажмите на звезду, чтобы оценить (1-10)</div>
                <div class="error-message" id="ratingError">Пожалуйста, оцените мероприятие</div>
            </div>
            
            <div class="form-group">
                <label>💬 Как прошло мероприятие? <span class="required">*</span></label>
                <textarea id="eventFeedback" rows="3" placeholder="Расскажите, как прошло мероприятие, что понравилось, что можно улучшить..."></textarea>
                <div class="error-message" id="eventFeedbackError">Пожалуйста, напишите отзыв о проведении мероприятия</div>
            </div>
            
            <div class="form-group">
                <label>📝 Дополнительный комментарий <span class="required">*</span></label>
                <textarea id="comment" rows="3" placeholder="Оставьте любой дополнительный комментарий или пожелание..."></textarea>
                <div class="error-message" id="commentError">Пожалуйста, оставьте комментарий</div>
            </div>
            
            <div class="form-actions">
                <button type="button" class="btn-cancel" id="cancelBtn">Отмена</button>
                <button type="submit" class="btn-submit">📤 Отправить отзыв</button>
            </div>
        </form>
    </div>
    
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <span>Отправка отзыва...</span>
        </div>
    </div>
    
    <script>
        const applicationId = {{ application_id }};
        const applicationName = "{{ application_name|escapejs }}";
        
        // Показываем название заявки
        document.getElementById('applicationName').textContent = applicationName;
        document.getElementById('applicationId').value = applicationId;
        
        // Система звездного рейтинга
        let selectedRating = 0;
        const stars = document.querySelectorAll('.rating-star');
        const ratingHint = document.getElementById('ratingHint');
        
        stars.forEach(star => {
            star.addEventListener('click', function() {
                selectedRating = parseInt(this.dataset.value);
                updateStars(selectedRating);
                ratingHint.textContent = `Оценка: ${selectedRating} из 10`;
                document.getElementById('ratingError').style.display = 'none';
            });
            
            star.addEventListener('mouseenter', function() {
                const value = parseInt(this.dataset.value);
                updateStars(value);
            });
            
            star.addEventListener('mouseleave', function() {
                updateStars(selectedRating);
            });
        });
        
        function updateStars(rating) {
            stars.forEach(star => {
                const value = parseInt(star.dataset.value);
                if (value <= rating) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });
        }
        
        // Валидация
        function validateForm() {
            let isValid = true;
            
            if (selectedRating === 0) {
                document.getElementById('ratingError').style.display = 'block';
                isValid = false;
            } else {
                document.getElementById('ratingError').style.display = 'none';
            }
            
            const eventFeedback = document.getElementById('eventFeedback').value.trim();
            if (!eventFeedback) {
                document.getElementById('eventFeedbackError').style.display = 'block';
                document.getElementById('eventFeedback').classList.add('error');
                isValid = false;
            } else {
                document.getElementById('eventFeedbackError').style.display = 'none';
                document.getElementById('eventFeedback').classList.remove('error');
            }
            
            const comment = document.getElementById('comment').value.trim();
            if (!comment) {
                document.getElementById('commentError').style.display = 'block';
                document.getElementById('comment').classList.add('error');
                isValid = false;
            } else {
                document.getElementById('commentError').style.display = 'none';
                document.getElementById('comment').classList.remove('error');
            }
            
            return isValid;
        }
        
        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 4000);
        }
        
        // Отправка формы
        document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!validateForm()) {
                showNotification('Пожалуйста, заполните все обязательные поля', 'error');
                return;
            }
            
            const loadingOverlay = document.getElementById('loadingOverlay');
            loadingOverlay.style.display = 'flex';
            
            const eventFeedback = document.getElementById('eventFeedback').value.trim();
            const comment = document.getElementById('comment').value.trim();
            
            try {
                const response = await fetch('/api/feedback/event-feedback/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        application_id: applicationId,
                        event_rating: selectedRating,
                        event_feedback: eventFeedback,
                        comment: comment
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showNotification('Спасибо за обратную связь!', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    showNotification(data.error || 'Ошибка при отправке', 'error');
                    loadingOverlay.style.display = 'none';
                }
            } catch (error) {
                console.error('Ошибка:', error);
                showNotification('Ошибка соединения с сервером', 'error');
                loadingOverlay.style.display = 'none';
            }
        });
        
        // Кнопка отмены
        document.getElementById('cancelBtn').addEventListener('click', () => {
            window.location.href = '/';
        });
    </script>
</body>
</html>
